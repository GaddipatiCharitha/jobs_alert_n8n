<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #fff; border-radius: 10px; padding: 30px; }
    h2 { color: #1a1a2e; border-bottom: 2px solid #e94560; padding-bottom: 10px; }
    .job-card { background: #f9f9f9; border-left: 4px solid #e94560; margin: 15px 0; padding: 15px; border-radius: 5px; }
    .job-title { font-size: 18px; font-weight: bold; color: #1a1a2e; }
    .job-meta { color: #555; font-size: 14px; margin: 5px 0; }
    .apply-btn { display: inline-block; background: #e94560; color: white; padding: 8px 20px; border-radius: 5px; text-decoration: none; margin-top: 10px; font-size: 14px; }
    .footer { text-align: center; color: #aaa; font-size: 12px; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 Today's AI/ML Job Alerts</h2>
    <div class="job-card">
      <div class="job-title">Python Developer</div>
      <div class="job-meta">🏢 Google &nbsp;|&nbsp; 📍 Bangalore &nbsp;|&nbsp; 💰 15 LPA</div>
      <a class="apply-btn" href="#">Apply Now</a>
    </div>
    <div class="job-card">
      <div class="job-title">AI/ML Engineer</div>
      <div class="job-meta">🏢 Amazon &nbsp;|&nbsp; 📍 Hyderabad &nbsp;|&nbsp; 💰 18 LPA</div>
      <a class="apply-btn" href="#">Apply Now</a>
    </div>
    <div class="job-card">
      <div class="job-title">Data Scientist</div>
      <div class="job-meta">🏢 Microsoft &nbsp;|&nbsp; 📍 Hyderabad &nbsp;|&nbsp; 💰 20 LPA</div>
      <a class="apply-btn" href="#">Apply Now</a>
    </div>
    <div class="footer">Automated by AI Job Automation · n8n Workflow</div>
  </div>
</body>
</html>
